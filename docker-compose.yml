services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [training_net]
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flowise}
      POSTGRES_USER: ${POSTGRES_USER:-flowise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowise} -d ${POSTGRES_DB:-flowise}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  flowise:
    image: flowiseai/flowise:3.1.2
    restart: unless-stopped
    networks: [training_net]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${FLOWISE_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - flowise_data:/root/.flowise
      - ./data:/data:ro
      - ./corpus:/corpus:ro
      - ./project:/project:ro
    environment:
      PORT: 3000
      DATABASE_TYPE: postgres
      DATABASE_PORT: 5432
      DATABASE_HOST: postgres
      DATABASE_NAME: ${POSTGRES_DB:-flowise}
      DATABASE_USER: ${POSTGRES_USER:-flowise}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      FLOWISE_USERNAME: ${FLOWISE_USERNAME:-admin}
      FLOWISE_PASSWORD: ${FLOWISE_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APIKEY_PATH: /root/.flowise/apikeys
      SECRETKEY_PATH: /root/.flowise
      PATH_TRAVERSAL_SAFETY: "false"
      HTTP_SECURITY_CHECK: "false"
      CUSTOM_MCP_SECURITY_CHECK: "false"
      GENERIC_TIMEZONE: ${TIMEZONE:-Europe/Paris}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  mcp-server:
    build: ./mcp-server
    restart: unless-stopped
    profiles: [mcp]
    networks: [training_net]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${MCP_SERVER_PORT:-8001}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data:ro
      - ./corpus:/corpus:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-flowise}
      POSTGRES_USER: ${POSTGRES_USER:-flowise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATA_DIR: /data
      CORPUS_DIR: /corpus
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: "8000"
      OPENAI_BASE_URL: ${OPENAI_GATEWAY_BASE_URL:-https://ai-gateway.liora.tech/v1}
      OPENAI_API_KEY: ${OPENAI_GATEWAY_API_KEY:-}

  init:
    image: alpine:3.20
    networks: [training_net]
    depends_on:
      flowise:
        condition: service_healthy
    volumes:
      - ./init:/init:ro
    environment:
      FLOWISE_URL: http://flowise:3000
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-flowise}
      POSTGRES_USER: ${POSTGRES_USER:-flowise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_EMAIL: admin@local.dev
      ADMIN_PASSWORD: ${FLOWISE_PASSWORD:-changeme_admin_password}
      OPENAI_API_KEY: ${OPENAI_GATEWAY_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl jq bash python3 py3-pip postgresql-client >/dev/null 2>&1
        exec /init/import-flows.sh

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: [https]
    networks: [training_net]
    depends_on:
      flowise:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env, e.g. 35-181-26-207.sslip.io}

volumes:
  pgdata:
  flowise_data:
  caddy_data:

networks:
  training_net:
    driver: bridge
